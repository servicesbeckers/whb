<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'nl-BE' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% if page.title and page.title != 'Home' %}
        {{ page.title }} |
        {% endif %}
        {{ site.title }}
    </title>

    <meta name="description"
          content="{{ page.description | default: page.summary | default: page.excerpt | strip_html | strip_newlines | default: site.description }}">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    {% include header.html %}

    <main class="site-main">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>
                <strong>Werkhuizen Beckers</strong>
                <span class="footer-sep">·</span>
                Maatwerk in staal, RVS en aluminium
            </p>
            <p class="footer-copy">
                © 2024 Alle rechten voorbehouden
            </p>
        </div>
    </footer>
</body>
</html>
